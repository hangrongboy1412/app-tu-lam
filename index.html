<!doctype html>
<html lang="vi">
<head>
  <link rel="icon"
href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App L&#432;u Kho</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <h1>💎𝒌𝒉𝒐 𝒎𝒂̂̃𝒖💎</h1>

  <div class="top-actions">
    <button id="settingsBtn" type="button">⚙️</button>
    <button id="pullBtn" type="button">📥</button>
  </div>
</header>
  <main class="layout">
    <section class="panel form-panel">
      <div class="panel-title">
        <h2 id="formTitle">Th&#234;m d&#7919; li&#7879;u</h2>
        <button id="resetBtn" class="ghost" type="button">L&#224;m m&#7899;i</button>
      </div>

      <form id="stockForm">
        <input id="editingId" type="hidden">

        <label>
          <span>M&#227; s&#7889;</span>
          <input id="code" required autocomplete="off" placeholder="VD: M001">
        </label>

        <label>
          <span>Lo&#7841;i</span>
          <input id="type" required autocomplete="off" placeholder="VD: Nh&#7851;n, d&#226;y, v&#242;ng...">
        </label>

        <label>
          <span>Th&#244;ng tin</span>
          <input id="info" autocomplete="off" placeholder="VD: Resin, size, mau...">
        </label>

        <label>
          <span>Ng&#224;y nh&#7853;p</span>
          <input id="entryDate" required type="date">
        </label>

        <div class="grid-3">
          <label>
            <span>Linh</span>
            <input id="wageA" inputmode="decimal" placeholder="0">
          </label>
          <label>
            <span>KHD</span>
            <input id="wageB" inputmode="decimal" placeholder="0">
          </label>
          <label>
            <span>KLT</span>
            <input id="wageC" inputmode="decimal" placeholder="0">
          </label>
        </div>

        <div class="grid-2">
          <label>
            <span>TLH</span>
            <input id="tlh" inputmode="decimal" placeholder="0">
          </label>
          <label>
            <span>TLV</span>
            <input id="tlv" inputmode="decimal" placeholder="0">
          </label>
        </div>

        <label>
  <span>Ghi chú</span>
  <textarea id="note" rows="3" placeholder="Không bắt buộc"></textarea>
</label>
<label class="upload-box" for="imageFile">
  <span>Ảnh sản phẩm</span>

  <input
    type="file"
    id="imageFile"
    accept="image/*">

  <div class="upload-content">
    <div class="upload-icon">📷</div>
    <div id="uploadText">
      Chọn hoặc kéo ảnh vào
    </div>
  </div>
</label>
<div class="save-btn-wrap">
  <button class="primary" type="submit">
    Lưu dữ liệu
  </button>
  <div id="toast"></div>
</div>
</form>
    </section>

    <section class="content">
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Danh s&#225;ch kho</h2>
        </div>

        <div class="filters" aria-label="B&#7897; l&#7885;c">
          <input id="searchInput" placeholder="T&#236;m m&#227;, lo&#7841;i, th&#244;ng tin, ghi ch&#250;...">
          <select id="typeFilter">
            <option value="">T&#7845;t c&#7843; lo&#7841;i</option>
          </select>
          <label>
            <span>T&#7915; ng&#224;y</span>
            <input id="fromDateFilter" type="date">
          </label>
          <label>
            <span>&#272;&#7871;n ng&#224;y</span>
            <input id="toDateFilter" type="date">
          </label>
          <button id="clearFiltersBtn" class="ghost" type="button">X&#243;a l&#7885;c</button>
        </div>
                <div id="stockCards" class="cards"></div>
        <p id="emptyState" class="empty">
          Chưa có dữ liệu.
        </p>
      </section>
    </section>
  </main>
  <script src="app.js"></script> 
<div id="imgModal" class="img-modal" onclick="closeImage()">
  <img id="imgPreview">
</div>
</body>
</html>
